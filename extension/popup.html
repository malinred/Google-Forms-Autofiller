<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 12px;
      font-family: sans-serif;
      font-size: 13px;
    }
    .header {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 10px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 6px;
      color: #1a73e8;
    }
    label {
      font-size: 12px;
      color: #444;
    }
    select {
      width: 100%;
      margin-top: 6px;
      padding: 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    button {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background-color: #1558b0;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="header">Google Forms Autofiller</div>
  <div>
    <label for="profileSelect">Select Profile:</label>
    <select id="profileSelect">
      <option value="">Loading profiles...</option>
    </select>
  </div>
  <button id="autofillBtn" disabled>Autofill Form</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
